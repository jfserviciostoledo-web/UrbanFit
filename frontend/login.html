<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | UrbanFit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="contenedor">
        <h2>Acceso de Socios</h2>
        <form id="form-login">
            <label for="email">Email:</label>
            <input type="email" id="email" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" required>

            <button type="submit" class="btn">Entrar</button>
        </form>
        <p>¿No eres socio? <a href="registro.html">Regístrate aquí</a></p>
    </main>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Llamamos a la nueva ruta de login que pusimos en el backend
            const respuesta = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const datos = await respuesta.json();

            if (respuesta.ok) {
                alert(datos.mensaje);
                // Si todo va bien, mándalo a la página principal del gimnasio
                window.location.href = 'index.html'; 
            } else {
                // Si el email no existe o la contraseña está mal
                alert("❌ Error: " + datos.mensaje);
            }
        });
    </script>
</body>
</html>
